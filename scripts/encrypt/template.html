      .card { width: 100%; max-width: 420px; background: #ffffff; border: 1px solid var(--border); border-radius: 12px; padding: 40px; display: flex; flex-direction: column; gap: 28px; }

      .card-label { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); }
      .card-subtitle { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
      #staticrypt-form { display: flex; flex-direction: column; gap: 16px; }
      .staticrypt-password-container { position: relative; }
      #staticrypt-password { width: 100%; background: var(--grey-light); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font); font-size: 15px; padding: 13px 44px 13px 16px; outline: none; transition: border-color 0.15s; -webkit-appearance: none; }
      #staticrypt-password::placeholder { color: var(--text-muted); opacity: 0.7; }
      #staticrypt-password:focus { border-color: var(--accent); background: #ffffff; }
      .staticrypt-toggle-password-visibility { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; opacity: 0.35; cursor: pointer; transition: opacity 0.15s; }
      .staticrypt-toggle-password-visibility:hover { opacity: 0.7; }
      .staticrypt-decrypt-button { width: 100%; background: var(--accent); color: #ffffff; font-family: var(--font); font-size: 14px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; border: none; border-radius: 40px; padding: 15px 24px; cursor: pointer; transition: background 0.15s; -webkit-appearance: none; }
      .staticrypt-decrypt-button:hover { background: var(--accent-hover); }
      .staticrypt-decrypt-button:active { transform: scale(0.99); }
      label.staticrypt-remember { display: flex; align-items: center; gap: 10px; cursor: pointer; }

      .staticrypt-remember input[type="checkbox"]:checked::after { content: ""; position: absolute; top: 1px; left: 4px; width: 4px; height: 7px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg); }

      .footer { font-size: 11px; color: var(--text-muted); opacity: 0.6; letter-spacing: 0.08em; text-transform: uppercase; }
      .hidden { display: none !important; }
